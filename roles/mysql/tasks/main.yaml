
- name: install mysql server
  package:
    name: mysql-server
    state: present
- name: start and enable mysql server
  service:
    state: started
    enabled: yes
    name: mysqld
- name: install dependencie
  ansible.builtin.pip:
    name: "{{ item }}"
    executable: pip3.9
  loop:
  - boto3
  - botocore

- name: setup root password
  command: mysql_secure_installation --set-root-pass "{{ mysql_secret }}"

