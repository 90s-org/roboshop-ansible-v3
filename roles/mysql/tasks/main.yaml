- name: print password
  debug:
    #msg: "{{ lookup('amazon.aws.secretsmanager_secret', 'roboshop/dev/mysql_root_password', region='us-east-1') | from_json }}"
    msg: "{{ mysql_secret }}"
- name: install mysql server
  package:
    name: mysql-server
    state: present
- name: start and enable mysql server
  service:
    state: started
    enabled: yes
    name: mysqld

- name: setup root password
  command: mysql_secure_installation --set-root-pass "{{ mysql_secret }}"